<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Body Simulator</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        body {
        margin: 0;
        background: #000;
        font-family: monospace;
        }

        canvas {
        display: block;
        cursor: crosshair;
        }

        #controls {
            position: fixed;
            top: 10px;
            right: 10px;
            color: #39ff85;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 12px;
            border: 1px solid rgba(57,255,133,0.2);
        }

        #controls label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        #controls select, #controls input[type='range']{
            background: #111;
            border: 1px solid #333;
            color: #ccc;
            font-family: monospace;
            font-size: 10px;
        }
    </style>
</head>

<body>
    <canvas id="simCanvas"></canvas>

    <div id="controls">
        <label>
            <input type="checkbox" id="toggleTrails" checked>
            Trails
        </label>
        <label>
            <input type="checkbox" id="toggleLabels" checked>
            Labels
        </label>
        <label>
            <input type="checkbox" id="toggleNotify" checked>
            Notification
        </label>
        </label>
            <div style="margin-bottom: 5px;">
                Vel Mode: 
                <select id="addVelMode">
                    <option value="circular">Circular orbit</option>
                    <option value="zero">Zero velocity</option>
                    <option value="random">Random</option>
                </select>
            </div>
            <div style="margin-bottom: 5px;">
                Mass:
                <select id="addMass">
                    <option value="3e-6">Earth (3e-6)</option>
                    <option value="1e-7">Small (1e-7)</option>
                    <option value="1e-4">Jupiter (1e-4)</option>
                    <option value="0.5">Star (0.5)</option>
                </select>
            </div>
            <div>
                Eccen:
                <input type="number" id="eccSlider" min="0" max="0.9" step="0.05" value="0" style="width: 80px";>
                <span id="eccVal">0</span>
            </div>

    <script>
    var canvas = document.getElementById("simCanvas");
    var ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    var W = canvas.width;
    var H = canvas.height;
    var G = 4 * Math.PI * Math.PI;

    var camScale = 35;
    var camX = W / 2;
    var camY = H / 2;

    var softening = 0.001;
    var softeningSquared = softening * softening;

    var showTrails = true;
    var showLabels = true;

    function toScreen(wx, wy) {
        return {
            x: camX + wx * camScale,
            y: camY - wy * camScale
        };
    }

    function fromScreen(sx, sy) {
        return {
            x: (sx - camX) / camScale,
            y: -(sy - camY) / camScale
        };
    }

    function showNotification(msg) {
        var el = document.getElementById('notification');
        el.textContent = msg;
        el.style.opacity = 1;
        setTimeout(function() {
            el.style.opacity = 0;
        }, 3000);
    }

    var STARS = [];
    for (var i = 0; i < 200; i++) {
        STARS.push({
            x: Math.random(),
            y: Math.random(),
            r: Math.random() * 1.2 + 0.2,
            a: Math.random() * Math.PI * 2,
            spd: Math.random() * 0.003 + 0.001
        });
    }

    function Body(opts) {
        this.name = opts.name;
        this.mass = opts.mass;
        this.x = opts.x;
        this.y = opts.y;
        this.vx = opts.vx;
        this.vy = opts.vy;
        this.color = opts.color;
        this.radius = opts.radius;
        this.fixed  = opts.fixed || false;
        this.alive = true;
        this.history = [];
        this.maxTrail = 500;
    }

    Body.prototype.recordTrail = function() {
        this.history.push({x: this.x, y: this.y, age: 0});
        if (this.history.length > this.maxTrail) {
            this.history.splice(0, 1);
        }
    }

    var bodies = [
        new Body({
             name: "Sun",     
             mass: 1,
             x: 0,
             y: 0,
             vx: 0,
             vy: 0,
             color: "#FDB813",
             radius: 14,
             fixed: true
        }),
        new Body({
            name: 'Mercury',
            mass: 1.65e-7,
            x: 0.387,
            y: 0,
            vx: 0,
            vy: 10.06,
            color: '#b5b5b5',
            radius: 3
        }),
        new Body({
            name: 'Venus',
            mass: 2.45e-6,
            x: 0.723,
            y: 0,
            vx: 0,
            vy: 7.38,
            color: '#e8c07a',
            radius: 4
        }),
        new Body({
            name: 'Earth',
            mass: 3e-6,
            x: 1,
            y: 0,
            vx: 0,
            vy: 6.283,
            color: '#4fc3f7',
            radius: 5
        }),
        new Body({
            name: 'Mars',
            mass: 3.2e-7,
            x: 1.524,
            y: 0,
            vx: 0,
            vy: 5.09,
            color: '#c1440e',
            radius: 4
        }),
        new Body({
            name: 'Jupiter',
            mass: 9.5e-4,
            x: 5.2,
            y: 0,
            vx: 0,
            vy: 2.755,
            color: '#c88b3a',
            radius: 10
        }),
        new Body({
            name: 'Saturn',
            mass: 2.85e-4,
            x: 9.54,
            y: 0,
            vx: 0,
            vy: 2.03,
            color: '#e6c58f',
            radius: 9
        }),
        new Body({
            name: 'Uranus',
            mass: 4.36e-5,
            x: 19.19,
            y: 0,
            vx: 0,
            vy: 1.43,
            color: '#4fd0e7',
            radius: 7
        }),
        new Body({
            name: 'Neptune',
            mass: 5.15e-5,
            x: 30.07,
            y: 0,
            vx: 0,
            vy: 1.14,
            color: '#4c6ef5',
            radius: 7
        }),
    ];

    var simTime = 0;
    var FIXED_DT = 0.002;

    function accel(bodies) {
        var n = bodies.length;
        var ax = new Float64Array(n);
        var ay = new Float64Array(n);
        for (var i = 0; i < n; i++) {
            if (!bodies[i].alive || bodies[i].fixed) continue;
            for (var j = 0; j < n; j++) {
                if (i === j || !bodies[j].alive) continue;
                var dx = bodies[j].x - bodies[i].x;
                var dy = bodies[j].y - bodies[i].y;
                var distSq = dx*dx + dy*dy + softeningSquared;
                var dist   = Math.sqrt(distSq);
                var f      = G * bodies[j].mass / (distSq * dist);
                ax[i] += f * dx;
                ay[i] += f * dy;
            }
        }
        return {ax: ax, ay : ay};

    }

    function rk4(bodies, dt) {
        var n = bodies.length;
        var i;
        var x0 = [], y0 = [], vx0 = [], vy0 = [];
        for (i = 0; i < n; i++) {
            x0.push(bodies[i].x);
            y0.push(bodies[i].y);
            vx0.push(bodies[i].vx);
            vy0.push(bodies[i].vy);
        }

        function gd(xs, ys, vxs, vys) {
            var sx = [], sy = [];
            for (var ii = 0; ii < n; ii++) {
                sx.push(bodies[ii].x);
                sy.push(bodies[ii].y);
                bodies[ii].x = xs[ii];
                bodies[ii].y = ys[ii];
            }
            var res = accel(bodies);
            for (var ii = 0; ii < n; ii++) {
                bodies[ii].x = sx[ii];
                bodies[ii].y = sy[ii];
            }
            var dvxs = [], dvys = [];
            for (var ii = 0; ii < n; ii++) {
                dvxs.push(res.ax[ii]);
                dvys.push(res.ay[ii]);
            }
            return {
                dxs: vxs,
                dys: vys,
                dvxs: dvxs,
                dvys: dvys
            };
        }

        var k1 = gd(x0, y0, vx0, vy0);
        var x1 = [], y1 = [], vx1 = [], vy1 = [];
        for (i = 0; i < n; i++) {
            x1.push(x0[i]+.5*dt*k1.dxs[i]);
            y1.push(y0[i]+.5*dt*k1.dys[i]);
            vx1.push(vx0[i]+.5*dt*k1.dvxs[i]);
            vy1.push(vy0[i]+.5*dt*k1.dvys[i]);
        }
        var k2 = gd(x1, y1, vx1, vy1);
        var x2 = [], y2 = [], vx2 = [], vy2 = [];
        for (i = 0; i < n; i++) {
            x2.push(x0[i]+.5*dt*k2.dxs[i]);
            y2.push(y0[i]+.5*dt*k2.dys[i]);
            vx2.push(vx0[i]+.5*dt*k2.dvxs[i]);
            vy2.push(vy0[i]+.5*dt*k2.dvys[i]);
        }
        var k3 = gd(x2, y2, vx2, vy2);
        var x3 = [], y3 = [], vx3 = [], vy3 = [];
        for (i = 0; i < n; i++) {
            x3.push(x0[i]+dt*k3.dxs[i]);
            y3.push(y0[i]+dt*k3.dys[i]);
            vx3.push(vx0[i]+dt*k3.dvxs[i]);
            vy3.push(vy0[i]+dt*k3.dvys[i]);
        }  
        var k4 = gd(x3, y3, vx3, vy3);
        for (i = 0; i < n; i++) {
            if (!bodies[i].alive || bodies[i].fixed) continue;
            bodies[i].x  = x0[i]  + (dt/6)*(k1.dxs[i]  + 2*k2.dxs[i]  + 2*k3.dxs[i]  + k4.dxs[i]);
            bodies[i].y  = y0[i]  + (dt/6)*(k1.dys[i]  + 2*k2.dys[i]  + 2*k3.dys[i]  + k4.dys[i]);
            bodies[i].vx = vx0[i] + (dt/6)*(k1.dvxs[i] + 2*k2.dvxs[i] + 2*k3.dvxs[i] + k4.dvxs[i]);
            bodies[i].vy = vy0[i] + (dt/6)*(k1.dvys[i] + 2*k2.dvys[i] + 2*k3.dvys[i] + k4.dvys[i]);
        }
    }

    function mergeCollisions(bodies) {
        var i, j;
        for (i = 0; i < bodies.length; i++) {
            if (!bodies[i].alive) continue;
            for (j = i + 1; j < bodies.length; j++) {
                if (!bodies[j].alive) continue;
                var dx = bodies[j].x - bodies[i].x;
                var dy = bodies[j].y - bodies[i].y;
                var dist = Math.sqrt(dx*dx + dy*dy);
                var minDist = Math.max((bodies[i].radius + bodies[j].radius) * 0.0005, 0.01);
                if (dist < minDist) {
                    var big = bodies[i].mass > bodies[j].mass ? bodies[i] : bodies[j];
                    var small = big === bodies[i] ? bodies[j] : bodies[i];
                    if (!big.fixed) {
                        big.vx = (big.vx * big.mass + small.vx * small.mass) / (big.mass + small.mass);
                        big.vy = (big.vy * big.mass + small.vy * small.mass) / (big.mass + small.mass);
                        big.mass = big.mass + small.mass;
                        var nr = big.radius + small.radius * 0.4;
                        big.radius = nr > 24? 24 : nr;

                    }
                    small.alive = false;
                }
            }
        }
        for (i = 0; i < bodies.length; i++) {
            if (!bodies[i].alive || bodies[i].fixed) continue;
            var d = Math.sqrt(bodies[i].x * bodies[i].x + bodies[i].y * bodies[i].y);
            if (d > 50) {
                bodies[i].alive = false;
                if (document.getElementById('toggleNotify').checked) {
                    showNotification(bodies[i].name + ' ejected from system');
                }
            }
        }
    }

    var isDragging = false;
    var dragStartX = 0;
    var dragStartY = 0;
    var hasDragged = false;

    canvas.addEventListener("mousedown", function(e) {
        isDragging = true;
        hasDragged = false;
        dragStartX = e.offsetX;
        dragStartY = e.offsetY;
    });

    window.addEventListener('mouseup', function() {
        isDragging = false;
    });
    window.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        hasDragged = true;
        var rect = canvas.getBoundingClientRect();
        var ox = e.clientX - rect.left;
        var oy = e.clientY - rect.top;
        camX += ox - dragStartX;
        camY += oy - dragStartY;
        dragStartX = ox;
        dragStartY = oy;
    });

    canvas.addEventListener("wheel", function(e) {
        e.preventDefault();
        var factor = e.deltaY < 0 ? 1.12 : 0.89;
        camX = e.offsetX - (e.offsetX - camX) * factor;
        camY = e.offsetY - (e.offsetY - camY) * factor;
        camScale *= factor;
    }, { passive: false });

    var BODY_COLORS = ['#ff9f43','#ee5a24','#0abde3','#10ac84','#f368e0','#ff6b6b','#a29bfe','#fd79a8'];

    canvas.addEventListener('click', function(e) {
        if (hasDragged) return;
        var pos = fromScreen(e.offsetX, e.offsetY);
        var alive = bodies.filter(function(b) { return b.alive; });
        var totalMass = 0;
        var comX = 0;
        var comY = 0;
        for (var i = 0; i < alive.length; i++) {
            totalMass += alive[i].mass;
            comX += alive[i].mass * alive[i].x;
            comY += alive[i].mass * alive[i].y;
        }
        if (totalMass > 0) {
            comX /= totalMass;
            comY /= totalMass;
        }
        var vx = 0, vy = 0;
        var velMode = document.getElementById('addVelMode').value;
        var ecc = parseFloat(document.getElementById('eccSlider').value);
        if (velMode === 'circular') {
            var closest = null;
            var closestDist = Infinity;
            for (var i = 0; i < alive.length; i++) {
                if (alive[i].mass < 1e-5) continue;
                var ddx = pos.x - alive[i].x;
                var ddy = pos.y - alive[i].y;
                var d = Math.sqrt(ddx*ddx + ddy*ddy);
                if (d < closestDist) {
                    closestDist = d;
                    closest = alive[i];
                }
            }
            var orbitMass = totalMass;
            var orbitX = comX;
            var orbitY = comY;
            if (closest && closestDist < 5) {
                orbitMass = closest.mass;
                orbitX = closest.x;
                orbitY = closest.y;
            }
            var relX = pos.x - orbitX;
            var relY = pos.y - orbitY;
            var orbitR = Math.sqrt(relX*relX + relY*relY);
            var circSpeed = orbitR > 0.01 ? Math.sqrt(G * orbitMass / orbitR) : 2;
            var adjSpeed = circSpeed * Math.sqrt((1 - ecc)/(1+ecc));
            var angle = Math.atan2(relY, relX) + Math.PI / 2;
            vx = adjSpeed * Math.cos(angle);
            vy = adjSpeed * Math.sin(angle);
        } else if (velMode === 'random') {
            var spd = Math.random() * 4 + 1;
            var ang = Math.random() * Math.PI * 2;
            vx = spd * Math.cos(ang);
            vy = spd * Math.sin(ang);
        }
        var m = parseFloat(document.getElementById('addMass').value);
        var r = m > 0.1? 12: m > 1e-4? 8:5;
        bodies.push(new Body({
            name: 'Body ' + (alive.length+1),
            mass: m,
            x: pos.x,
            y: pos.y,
            vx: vx,
            vy: vy,
            color: BODY_COLORS[bodies.length % BODY_COLORS.length],
            radius: r
        }));
    });

    document.getElementById('toggleTrails').addEventListener('change', function(e) {
        showTrails = e.target.checked;
        if (!showTrails) {
            for (var i = 0; i < bodies.length; i++) {
                bodies[i].history = [];
            }
        }
    });
    document.getElementById('toggleLabels').addEventListener('change', function(e) {
        showLabels = e.target.checked;
    });
    document.getElementById('eccSlider').addEventListener('input', function() {
        document.getElementById('eccVal').textContent = parseFloat(this.value).toFixed(1);
    });

    function draw() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, W, H);

        for (var i = 0; i < STARS.length; i++) {
            var s = STARS[i];
            s.a += s.spd;
            var alpha = 0.3 + 0.5 * Math.abs(Math.sin(s.a));
            ctx.beginPath();
            ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(200, 212, 240, ' + alpha + ')';
            ctx.fill();
        }

        if (showTrails) {
            for (var i = 0; i < bodies.length; i++) {
                var b = bodies[i];
                if (!b.alive || b.history.length<2) continue;
                for (var j=1; j < b.history.length; j++) {
                    var p0 = b.history[j-1];
                    var p1 = b.history[j];
                    var maxAge = Math.max(p0.age, p1.age, 1);
                    if (maxAge > 600) continue;
                    var ta = 0.5 * (1- maxAge / 600);
                    if (ta <= 0.02) continue;
                    var s0 = toScreen(p0.x, p0.y);
                    var s1 = toScreen(p1.x, p1.y);
                    var aInt = Math.round(ta * 255);
                    var aHex = aInt.toString(16);
                    if (aHex.length === 1) aHex = '0' + aHex;
                    ctx.beginPath();
                    ctx.moveTo(s0.x, s0.y);
                    ctx.lineTo(s1.x, s1.y);
                    ctx.strokeStyle = b.color + aHex;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                }
            }
        }

        ctx.fillStyle = 'rgba(57,255,133,0.4)';
        ctx.font = '11px monospace';
        ctx.fillText('t = ' + simTime.toFixed(3) + ' yr', 12, 20);

        for (var i = 0; i < bodies.length; i++) {
            var b = bodies[i];
            if (!b.alive) continue;
            var pos = toScreen(b.x, b.y);
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = b.color;
            ctx.fill();
            if (showLabels) {
                ctx.fillStyle = 'rgba(200, 213, 224, 0.6)';
                ctx.font = '10px monospace';
                ctx.fillText(b.name, pos.x + b.radius + 4, pos.y + 4);
            }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        rk4(bodies, FIXED_DT);
        mergeCollisions(bodies);
        if (showTrails) {
            for (var i = 0; i < bodies.length; i++) {
                if (bodies[i].alive) {
                    bodies[i].recordTrail();
                }
            }
        }
        for (var i = 0; i < bodies.length; i++) {
            if (bodies[i].alive) {
                for (var j = 0; j < bodies[i].history.length; j++) {
                    bodies[i].history[j].age++;
                }
            }
        }
        simTime += FIXED_DT;
        draw();
    }

    animate();


    </script>

</body>
</html>
