<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Body Simulator</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        canvas {
        display: block;
        margin: 40px auto;
        background: #000;
        border: 1px solid var(--border);
        }
    </style>
</head>

<body>
    <nav>
        <span class="nav-logo">Physics</span>
        <span>Sim.</span>
        <a href="../index.html">Home</a>
        <span class="nav-spacer"></span>
        <span class="nav-status">RUNNING</span>
    </nav>
    
    <canvas id="sim" width="800" height="500"></canvas>

    <script>
    const canvas = document.getElementById("sim");
    const ctx = canvas.getContext("2d");

    const G = 0.2;

    const bodies = [
    { x: 400, y: 250, vx: 0, vy: 0, mass: 2000, r: 12 },
    { x: 400, y: 130, vx: 2.3, vy: 0, mass: 10, r: 5 }
    ];

    function update() {

    for (let i = 0; i < bodies.length; i++) {

        let ax = 0;
        let ay = 0;

        for (let j = 0; j < bodies.length; j++) {

        if (i === j) continue;

        const dx = bodies[j].x - bodies[i].x;
        const dy = bodies[j].y - bodies[i].y;

        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 5) dist = 5;

        const force = G * bodies[j].mass / (dist * dist);

        ax += force * dx / dist;
        ay += force * dy / dist;
        }

        bodies[i].vx += ax;
        bodies[i].vy += ay;
    }

    for (let body of bodies) {
        body.x += body.vx;
        body.y += body.vy;
    }
    }

    function draw() {

    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < bodies.length; i++) {

        ctx.beginPath();
        ctx.arc(bodies[i].x, bodies[i].y, bodies[i].r, 0, Math.PI * 2);

        ctx.fillStyle = i === 0 ? "#ffb83f" : "#4fc3f7";
        ctx.fill();
    }
    }

    function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
    }

    loop();
    </script>

</body>
</html>
