<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Body Simulator</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        body {
        margin: 0;
        background: #000;
        font-family: monospace;
        }

        canvas {
        display: block;
        cursor: crosshair;
        }
    </style>
</head>

<body>
    <canvas id="simCanvas"></canvas>

    <script>
    var canvas = document.getElementById("simCanvas");
    var ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    var W = canvas.width;
    var H = canvas.height;
    var G = 4 * Math.PI * Math.PI;

    var camScale = 80;
    var camX = W / 2;
    var camY = H / 2;

    function toScreen(wx, wy) {
        return {
            x: camX + wx * camScale,
            y: camY - wy * camScale
        };
    }

    function fromScreen(sx, sy) {
        return {
            x: (sx - camX) / camScale,
            y: -(sy - camY) / camScale
        };
    }

    var STARS = [];
    for (var i = 0; i < 200; i++) {
        STARS.push({
            x: Math.random(),
            y: Math.random(),
            r: Math.random() * 1.2 + 0.2,
            a: Math.random() * Math.PI * 2,
            spd: Math.random() * 0.003 + 0.001
        });
    }

    function Body(opts) {
        this.name = opts.name;
        this.mass = opts.mass;
        this.x = opts.x;
        this.y = opts.y;
        this.vx = opts.vx;
        this.vy = opts.vy;
        this.color = opts.color;
        this.radius = opts.radius;
        this.fixed  = opts.fixed || false;
        this.alive = true;
    }

    var bodies = [
        new Body({
             name: "Sun",     
             mass: 1,
             x: 0,
             y: 0,
             vx: 0,
             vy: 0,
             color: "#FDB813",
             radius: 14,
             fixed: true
        }),
        new Body({
            name: 'Mercury',
            mass: 1.65e-7,
            x: 0.387,
            y: 0,
            vx: 0,
            vy: 10.06,
            color: '#b5b5b5',
            radius: 3
        }),
        new Body({
            name: 'Venus',
            mass: 2.45e-6,
            x: 0.723,
            y: 0,
            vx: 0,
            vy: 7.38,
            color: '#e8c07a',
            radius: 4
        }),
        new Body({
            name: 'Earth',
            mass: 3e-6,
            x: 1,
            y: 0,
            vx: 0,
            vy: 6.283,
            color: '#4fc3f7',
            radius: 5
        }),
        new Body({
            name: 'Mars',
            mass: 3.2e-7,
            x: 1.524,
            y: 0,
            vx: 0,
            vy: 5.09,
            color: '#c1440e',
            radius: 4
        }),
        new Body({
            name: 'Jupiter',
            mass: 9.5e-4,
            x: 5.2,
            y: 0,
            vx: 0,
            vy: 2.755,
            color: '#c88b3a',
            radius: 10
        }),
        new Body({
            name: 'Saturn',
            mass: 2.85e-4,
            x: 9.54,
            y: 0,
            vx: 0,
            vy: 2.03,
            color: '#e6c58f',
            radius: 9
        }),
        new Body({
            name: 'Uranus',
            mass: 4.36e-5,
            x: 19.19,
            y: 0,
            vx: 0,
            vy: 1.43,
            color: '#4fd0e7',
            radius: 7
        }),
        new Body({
            name: 'Neptune',
            mass: 5.15e-5,
            x: 30.07,
            y: 0,
            vx: 0,
            vy: 1.14,
            color: '#4c6ef5',
            radius: 7
        }),
    ];

    var simTime = 0;
    var FIXED_DT = 0.002;

    function accel(bodies) {
        var n = bodies.length;
        var ax = new Float64Array(n);
        var ay = new Float64Array(n);
        for (var i = 0; i < n; i++) {
            if (!bodies[i].alive || bodies[i].fixed) continue;
            for (var j = 0; j < n; j++) {
                if (i === j || !bodies[j].alive) continue;
                var dx = bodies[j].x - bodies[i].x;
                var dy = bodies[j].y - bodies[i].y;
                var distSq = dx*dx + dy*dy;
                var dist   = Math.sqrt(distSq);
                var f      = G * bodies[j].mass / (distSq * dist);
                ax[i] += f * dx;
                ay[i] += f * dy;
            }
        }
        return {ax: ax, ay : ay};

    }

    function rk4(bodies, dt) {
        var n = bodies.length;
        var i;
        var x0 = [], y0 = [], vx0 = [], vy0 = [];
        for (i = 0; i < n; i++) {
            x0.push(bodies[i].x);
            y0.push(bodies[i].y);
            vx0.push(bodies[i].vx);
            vy0.push(bodies[i].vy);
        }

        function gd(xs, ys, vxs, vys) {
            var sx = [], sy = [];
            for (var ii = 0; ii < n; ii++) {
                sx.push(bodies[ii].x);
                sy.push(bodies[ii].y);
                bodies[ii].x = xs[ii];
                bodies[ii].y = ys[ii];
            }
            var res = accel(bodies);
            for (var ii = 0; ii < n; ii++) {
                bodies[ii].x = sx[ii];
                bodies[ii].y = sy[ii];
            }
            var dvxs = [], dvys = [];
            for (var ii = 0; ii < n; ii++) {
                dvxs.push(res.ax[ii]);
                dvys.push(res.ay[ii]);
            }
            return {
                dxs: vxs,
                dys: vys,
                dvxs: dvxs,
                dvys: dvys
            };
        }

        var k1 = gd(x0, y0, vx0, vy0);
        var x1 = [], y1 = [], vx1 = [], vy1 = [];
        for (i = 0; i < n; i++) {
            x1.push(x0[i]+.5*dt*k1.dxs[i]);
            y1.push(y0[i]+.5*dt*k1.dys[i]);
            vx1.push(vx0[i]+.5*dt*k1.dvxs[i]);
            vy1.push(vy0[i]+.5*dt*k1.dvys[i]);
        }
        var k2 = gd(x1, y1, vx1, vy1);
        var x2 = [], y2 = [], vx2 = [], vy2 = [];
        for (i = 0; i < n; i++) {
            x2.push(x0[i]+.5*dt*k2.dxs[i]);
            y2.push(y0[i]+.5*dt*k2.dys[i]);
            vx2.push(vx0[i]+.5*dt*k2.dvxs[i]);
            vy2.push(vy0[i]+.5*dt*k2.dvys[i]);
        }
        var k3 = gd(x2, y2, vx2, vy2);
        var x3 = [], y3 = [], vx3 = [], vy3 = [];
        for (i = 0; i < n; i++) {
            x3.push(x0[i]+dt*k3.dxs[i]);
            y3.push(y0[i]+dt*k3.dys[i]);
            vx3.push(vx0[i]+dt*k3.dvxs[i]);
            vy3.push(vy0[i]+dt*k3.dvys[i]);
        }  
        var k4 = gd(x3, y3, vx3, vy3);
        for (i = 0; i < n; i++) {
            if (!bodies[i].alive || bodies[i].fixed) continue;
            bodies[i].x  = x0[i]  + (dt/6)*(k1.dxs[i]  + 2*k2.dxs[i]  + 2*k3.dxs[i]  + k4.dxs[i]);
            bodies[i].y  = y0[i]  + (dt/6)*(k1.dys[i]  + 2*k2.dys[i]  + 2*k3.dys[i]  + k4.dys[i]);
            bodies[i].vx = vx0[i] + (dt/6)*(k1.dvxs[i] + 2*k2.dvxs[i] + 2*k3.dvxs[i] + k4.dvxs[i]);
            bodies[i].vy = vy0[i] + (dt/6)*(k1.dvys[i] + 2*k2.dvys[i] + 2*k3.dvys[i] + k4.dvys[i]);
        }
    }

    var isDragging = false;
     var dragStartX = 0;
    var dragStartY = 0;

    canvas.addEventListener("mousedown", function(e) {
        isDragging = true;
        dragStartX = e.offsetX;
        dragStartY = e.offsetY;
    });

    window.addEventListener('mouseup', function() {
        isDragging = false;
    });
    window.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        var rect = canvas.getBoundingClientRect();
        var ox = e.clientX - rect.left;
        var oy = e.clientY - rect.top;
        camX += ox - dragStartX;
        camY += oy - dragStartY;
        dragStartX = ox;
        dragStartY = oy;
    });

    canvas.addEventListener("wheel", function(e) {
        e.preventDefault();
        var factor = e.deltaY < 0 ? 1.12 : 0.89;
        camX = e.offsetX - (e.offsetX - camX) * factor;
        camY = e.offsetY - (e.offsetY - camY) * factor;
        camScale *= factor;
    }, { passive: false });

    function draw() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, W, H);

        for (var i = 0; i < STARS.length; i++) {
            var s = STARS[i];
            s.a += s.spd;
            var alpha = 0.3 + 0.5 * Math.abs(Math.sin(s.a));
            ctx.beginPath();
            ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(200, 212, 240, ' + alpha + ')';
            ctx.fill();
        }

        ctx.fillStyle = 'rgba(57,255,133,0.4)';
        ctx.font = '11px monospace';
        ctx.fillText('t = ' + simTime.toFixed(3) + ' yr', 12, 20);
        for (var i = 0; i < bodies.length; i++) {
        var b = bodies[i];
        if (!b.alive) continue;
        var pos = toScreen(b.x, b.y);
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, b.radius, 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.fill();
        ctx.fillStyle = 'rgba(200, 213, 224, 0.6)';
        ctx.font = '10px monospace';
        ctx.fillText(b.name, pos.x + b.radius + 4, pos.y + 4);
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        rk4(bodies, FIXED_DT);
        simTime += FIXED_DT;
        draw();
    }

    animate();


    </script>

</body>
</html>
